# 🪸 CORAL-CORE Docker Compose Production Configuration
# Biomineralization Dynamics & Reef Hydro-Acoustic Buffering Framework
# Version: 1.0.0 | DOI: 10.5281/zenodo.18913829

version: '3.8'

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  coralcore-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
  monitoring-network:
    driver: bridge

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres-data:
    driver: local
  timescaledb-data:
    driver: local
  redis-data:
    driver: local
  influxdb-data:
    driver: local
  grafana-data:
    driver: local
  prometheus-data:
    driver: local
  elasticsearch-data:
    driver: local
  coralcore-data:
    driver: local
  coralcore-logs:
    driver: local
  coralcore-backup:
    driver: local

# =============================================================================
# SERVICES
# =============================================================================
services:
  # ===========================================================================
  # DATABASE SERVICES
  # ===========================================================================
  
  postgres:
    image: postgres:15-alpine
    container_name: coralcore-postgres
    restart: unless-stopped
    networks:
      - coralcore-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_DB: coralcore
      POSTGRES_USER: coraluser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coraluser -d coralcore"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: coralcore-timescaledb
    restart: unless-stopped
    networks:
      - coralcore-network
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: coralcore_ts
      POSTGRES_USER: coraluser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5433:5432"
    command: ["postgres", "-c", "shared_preload_libraries=timescaledb"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coraluser -d coralcore_ts"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: coralcore-redis
    restart: unless-stopped
    networks:
      - coralcore-network
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  influxdb:
    image: influxdb:2.7-alpine
    container_name: coralcore-influxdb
    restart: unless-stopped
    networks:
      - coralcore-network
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - ./docker/influxdb/config.yml:/etc/influxdb2/config.yml
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-changeme}
      DOCKER_INFLUXDB_INIT_ORG: coralcore
      DOCKER_INFLUXDB_INIT_BUCKET: sensor_data
      DOCKER_INFLUXDB_INIT_RETENTION: 30d
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  elasticsearch:
    image: elasticsearch:8.8.0
    container_name: coralcore-elasticsearch
    restart: unless-stopped
    networks:
      - coralcore-network
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
      - ./docker/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
    environment:
      - node.name=elasticsearch
      - cluster.name=coralcore-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # MESSAGE QUEUE
  # ===========================================================================
  
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: coralcore-rabbitmq
    restart: unless-stopped
    networks:
      - coralcore-network
    volumes:
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
    environment:
      RABBITMQ_DEFAULT_USER: coraluser
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-changeme}
      RABBITMQ_DEFAULT_VHOST: coralcore
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # CORAL-CORE SERVICES
  # ===========================================================================
  
  collector:
    image: coralcore:latest
    container_name: coralcore-collector
    restart: unless-stopped
    networks:
      - coralcore-network
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - coralcore-data:/data
      - coralcore-logs:/logs
      - ./config:/config:ro
      - /dev:/dev:ro  # For sensor access
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
      - "/dev/ttyUSB1:/dev/ttyUSB1"
      - "/dev/ttyUSB2:/dev/ttyUSB2"
    environment:
      - STATION_ID=${STATION_ID:-RAS_MOHAMMED_01}
      - STATION_LAT=${STATION_LAT:-27.75}
      - STATION_LON=${STATION_LON:-34.23}
      - DATA_DIR=/data
      - LOG_DIR=/logs
      - CONFIG_DIR=/config
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=coralcore
      - DB_USER=coraluser
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - TSDB_HOST=timescaledb
      - TSDB_PORT=5433
      - TSDB_NAME=coralcore_ts
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=coraluser
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-changeme}
    command: ["collect", "--interval", "60"]
    privileged: true  # Required for USB access
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  processor:
    image: coralcore:latest
    container_name: coralcore-processor
    restart: unless-stopped
    networks:
      - coralcore-network
    depends_on:
      - collector
      - postgres
      - timescaledb
      - redis
      - rabbitmq
    volumes:
      - coralcore-data:/data
      - coralcore-logs:/logs
      - ./config:/config:ro
      - ./models:/models:ro
    environment:
      - DATA_DIR=/data
      - LOG_DIR=/logs
      - CONFIG_DIR=/config
      - MODELS_DIR=/models
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=coralcore
      - DB_USER=coraluser
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - TSDB_HOST=timescaledb
      - TSDB_PORT=5433
      - TSDB_NAME=coralcore_ts
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=coraluser
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-changeme}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-}
    command: ["process", "--interval", "300"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    image: coralcore:latest
    container_name: coralcore-api
    restart: unless-stopped
    networks:
      - coralcore-network
    depends_on:
      - postgres
      - timescaledb
      - redis
    volumes:
      - coralcore-data:/data
      - coralcore-logs:/logs
      - ./config:/config:ro
    environment:
      - LOG_DIR=/logs
      - CONFIG_DIR=/config
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=coralcore
      - DB_USER=coraluser
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - TSDB_HOST=timescaledb
      - TSDB_PORT=5433
      - TSDB_NAME=coralcore_ts
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-me}
      - FLASK_ENV=production
    ports:
      - "5000:5000"
    command: ["serve", "--host", "0.0.0.0", "--port", "5000"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    image: coralcore:latest
    container_name: coralcore-dashboard
    restart: unless-stopped
    networks:
      - coralcore-network
    depends_on:
      - api
    volumes:
      - coralcore-logs:/logs
      - ./config:/config:ro
    environment:
      - LOG_DIR=/logs
      - CONFIG_DIR=/config
      - API_URL=http://api:5000
      - DASHBOARD_PORT=8050
    ports:
      - "8050:8050"
    command: ["python", "-m", "coralcore.visualization.dashboard", "--port", "8050"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # MONITORING SERVICES
  # ===========================================================================
  
  prometheus:
    image: prom/prometheus:latest
    container_name: coralcore-prometheus
    restart: unless-stopped
    networks:
      - coralcore-network
      - monitoring-network
    volumes:
      - prometheus-data:/prometheus
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    container_name: coralcore-grafana
    restart: unless-stopped
    networks:
      - coralcore-network
      - monitoring-network
    depends_on:
      - prometheus
      - influxdb
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    ports:
      - "3000:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:latest
    container_name: coralcore-alertmanager
    restart: unless-stopped
    networks:
      - coralcore-network
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # LOGGING SERVICES
  # ===========================================================================
  
  fluentd:
    image: fluent/fluentd:v1.16-debian
    container_name: coralcore-fluentd
    restart: unless-stopped
    networks:
      - coralcore-network
    volumes:
      - ./docker/fluentd/fluent.conf:/fluentd/etc/fluent.conf
      - coralcore-logs:/logs
      - coralcore-data:/data
    ports:
      - "24224:24224"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kibana:
    image: kibana:8.8.0
    container_name: coralcore-kibana
    restart: unless-stopped
    networks:
      - coralcore-network
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
    ports:
      - "5601:5601"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # BACKUP SERVICE
  # ===========================================================================
  
  backup:
    image: alpine:latest
    container_name: coralcore-backup
    restart: unless-stopped
    networks:
      - coralcore-network
    volumes:
      - coralcore-data:/data:ro
      - coralcore-backup:/backup
      - ./docker/backup/backup.sh:/backup.sh
    environment:
      - BACKUP_SCHEDULE="0 2 * * *"  # Daily at 2 AM
      - BACKUP_RETENTION_DAYS=30
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-}
    command: /bin/sh -c "chmod +x /backup.sh && crond -f"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # NGINX REVERSE PROXY
  # ===========================================================================
  
  nginx:
    image: nginx:alpine
    container_name: coralcore-nginx
    restart: unless-stopped
    networks:
      - coralcore-network
    depends_on:
      - api
      - dashboard
      - grafana
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - coralcore-logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# =============================================================================
# END OF DOCKER-COMPOSE.YML
# =============================================================================
